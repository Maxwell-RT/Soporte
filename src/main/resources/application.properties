spring.application.name=Soporte
server.port=8084
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:mysql://localhost:3306/Soportedb
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# HATEOAS - Configuración de SpringDoc con Swagger UI
# Los links HATEOAS se incluyen automáticamente en las respuestas con EntityModel y CollectionModel
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
# Cambiar la ruta del JSON con la especificación OpenAPI (Por defecto: /v3/api-docs)
springdoc.api-docs.path=/api-docs

# Ordenar los endpoints alfabéticamente en la UI
springdoc.swagger-ui.operationsSorter=alpha

# HATEOAS - Desabilitar auto-configuración de HATEOAS en SpringDoc para evitar conflictos
#springdoc.springdoc-hateoas-enabled=false