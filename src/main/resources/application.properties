
server.port=8084


spring.datasource.url=jdbc:mysql://localhost:3306/soporte_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


# HATEOAS - Configuración de SpringDoc con Swagger UI
# Los links HATEOAS se incluyen automáticamente en las respuestas con EntityModel y CollectionModel
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
# Cambiar la ruta del JSON con la especificación OpenAPI (Por defecto: /v3/api-docs)
springdoc.api-docs.path=/api-docs

# Ordenar los endpoints alfabéticamente en la UI
springdoc.swagger-ui.operationsSorter=alpha

# HATEOAS - Desabilitar auto-configuración de HATEOAS en SpringDoc para evitar conflictos
springdoc.springdoc-hateoas-enabled=false